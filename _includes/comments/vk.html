<!-- VK Comments - Async Implementation -->
<div class="vk-comments-wrapper">
  <h3 class="mb-4">
    <i class="fab fa-vk me-2" style="color: #4680c2;"></i>
    Комментарии
  </h3>
  
  <div id="vk_comments"></div>
  <div id="vk_api_transport"></div>
  <div id="vk_loader" class="text-center py-4">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Загрузка...</span>
    </div>
  </div>
</div>

<script type="text/javascript">
// Конфигурация
var VK_APP_ID = {{ site.comments.vk.app_id | default: 0 }};

if (!VK_APP_ID) {
  document.getElementById('vk_loader').innerHTML = 
    '<div class="alert alert-warning">VK App ID не настроен</div>';
} else {
  
  // Асинхронная инициализация согласно официальной документации VK
  window.vkAsyncInit = function() {
    VK.init({
      apiId: VK_APP_ID,
      onlyWidgets: true
    });
    
    // Конфигурация виджета
    var options = {
      {% if site.comments.vk.width %}width: {{ site.comments.vk.width }},{% endif %}
      {% if site.comments.vk.height and site.comments.vk.height > 0 %}height: {{ site.comments.vk.height }},{% endif %}
      limit: {{ site.comments.vk.limit | default: 10 }},
      attach: "{{ site.comments.vk.attach | default: '*' }}",
      autoPublish: {{ site.comments.vk.auto_publish | default: 0 }},
      norealtime: {{ site.comments.vk.realtime | default: 0 }}
      {% if site.comments.vk.page_url %},pageUrl: "{{ page.url | absolute_url }}"{% endif %}
      {% if site.comments.vk.page_id %},page_id: "{{ page.id | default: page.url | slugify }}"{% endif %}
    };
    
    // Инициализация виджета
    try {
      VK.Widgets.Comments('vk_comments', options);
      
      // События
      VK.Observer.subscribe('widgets.comments.new_comment', function(num, last_comment, date, sign) {
        console.log('VK Comment added:', num, last_comment.substring(0, 50));
        
        {% if site.google_analytics %}
        if (typeof gtag !== 'undefined') {
          gtag('event', 'vk_comment_posted', {
            'event_category': 'social',
            'event_label': '{{ page.title | escape }}',
            'value': num
          });
        }
        {% endif %}
      });
      
      VK.Observer.subscribe('widgets.comments.delete_comment', function(num) {
        console.log('VK Comment deleted, total:', num);
      });
      
      // Скрываем загрузчик
      setTimeout(function() {
        var loader = document.getElementById('vk_loader');
        if (loader) loader.style.display = 'none';
      }, 1500);
      
    } catch (error) {
      console.error('VK Comments error:', error);
      document.getElementById('vk_loader').innerHTML = 
        '<div class="alert alert-danger">Ошибка загрузки VK комментариев</div>';
    }
  };
  
  // Загрузка VK API асинхронно
  setTimeout(function() {
    var el = document.createElement("script");
    el.type = "text/javascript";
    el.src = "https://vk.com/js/api/openapi.js?169";
    el.async = true;
    document.getElementById("vk_api_transport").appendChild(el);
  }, 0);
}
</script>
