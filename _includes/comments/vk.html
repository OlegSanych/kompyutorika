<!-- Minimal VK Comments -->
<div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #eee;">
  <h3>Комментарии</h3>
  <div id="vk_comments"></div>
  <div id="vk_loader" style="text-align: center; padding: 20px;">Загрузка...</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var appId = {{ site.comments.vk.app_id }};
  var pageUrl = "{{ page.url | absolute_url }}";
  
  if (appId && typeof VK !== 'undefined') {
    try {
      VK.init({
        apiId: appId,
        onlyWidgets: true
      });
      
      VK.Widgets.Comments('vk_comments', {
        width: '100%',
        height: 0,
        limit: 15,
        pageUrl: pageUrl
      });
      
      document.getElementById('vk_loader').style.display = 'none';
      
    } catch (error) {
      console.error('VK Error:', error);
      document.getElementById('vk_loader').innerHTML = 'Ошибка загрузки';
    }
  } else {
    document.getElementById('vk_loader').innerHTML = 'VK API недоступен';
  }
});
</script>
