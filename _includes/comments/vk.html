<!-- VK Comments Widget -->
<div class="vk-comments-wrapper">
  <div id="vk_comments" class="vk-comments-container"></div>
</div>

<script type="text/javascript">
  // Инициализация VK API происходит в head.html
  if (typeof VK !== 'undefined') {
    var vkOptions = {
      {% if site.comments.vk.width %}width: {{ site.comments.vk.width }},{% endif %}
      {% if site.comments.vk.height %}height: {{ site.comments.vk.height }},{% endif %}
      {% if site.comments.vk.limit %}limit: {{ site.comments.vk.limit }},{% endif %}
      {% if site.comments.vk.attach %}attach: "{{ site.comments.vk.attach }}",{% endif %}
      {% if site.comments.vk.auto_publish %}autoPublish: {{ site.comments.vk.auto_publish }},{% endif %}
      {% if site.comments.vk.norealtime %}norealtime: {{ site.comments.vk.norealtime }},{% endif %}
      {% if site.comments.vk.page_url %}pageUrl: "{{ site.comments.vk.page_url }}",{% else %}pageUrl: "{{ site.url }}{{ page.url }}",{% endif %}
    };

    VK.Widgets.Comments('vk_comments', vkOptions);
  }
</script>

<style>
/* Адаптивные стили для VK виджета */
.vk-comments-wrapper {
  margin: 2rem 0;
  width: 100%;
}

.vk-comments-container {
  width: 100%;
  min-height: 200px;
}

/* Стили для темной темы Chirpy */
[data-mode="dark"] .vk-comments-wrapper {
  background-color: var(--main-bg);
  border-radius: 0.375rem;
  padding: 1rem;
  border: 1px solid var(--main-border-color);
}

/* Адаптивность для мобильных устройств */
@media (max-width: 768px) {
  .vk-comments-wrapper {
    margin: 1rem -1rem;
    padding: 1rem;
  }
  
  .vk-comments-container {
    overflow-x: auto;
  }
}

/* Интеграция с цветовой схемой Chirpy */
.vk-comments-wrapper {
  color: var(--text-color);
  background-color: var(--card-bg);
  transition: background-color 0.35s ease-in-out;
}

/* Настройка отступов под дизайн темы */
.vk-comments-wrapper {
  margin-top: 3rem;
  border-top: 1px solid var(--main-border-color);
  padding-top: 2rem;
}

/* Responsive iframe для VK виджета */
.vk-comments-container iframe {
  width: 100% !important;
  max-width: 100% !important;
}
</style>
